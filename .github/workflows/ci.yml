name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: SAST — Semgrep
  # ─────────────────────────────────────────────
  semgrep:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep --break-system-packages

      - name: Run Semgrep SAST scan
        run: |
          semgrep scan \
            --config "p/default" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --severity=ERROR \
            --sarif \
            --output semgrep.sarif \
            . || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      backend-tag:  ${{ steps.vars.outputs.backend-tag }}
      frontend-tag: ${{ steps.vars.outputs.frontend-tag }}
    steps:
      - uses: actions/checkout@v4
 
      - uses: docker/setup-buildx-action@v4
 
      - name: Compute image tags
        id: vars
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKER_USER" ]; then
            BACKEND_TAG="skillpulse-backend:${{ github.sha }}"
            FRONTEND_TAG="skillpulse-frontend:${{ github.sha }}"
          else
            BACKEND_TAG="${DOCKER_USER}/skillpulse-backend:${{ github.sha }}"
            FRONTEND_TAG="${DOCKER_USER}/skillpulse-frontend:${{ github.sha }}"
          fi
          echo "backend-tag=${BACKEND_TAG}"   >> "$GITHUB_OUTPUT"
          echo "frontend-tag=${FRONTEND_TAG}" >> "$GITHUB_OUTPUT"
 
      - uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          # load: true — image ko local Docker daemon mein load karo (tar ke liye)
          load: true
          push: false
          tags: ${{ steps.vars.outputs.backend-tag }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
 
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          push: false
          tags: ${{ steps.vars.outputs.frontend-tag }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
 
      # Image ko tar mein save karo taake Trivy jobs load kar sakein
      - name: Save images as tar
        run: |
          docker save ${{ steps.vars.outputs.backend-tag }}  -o backend.tar
          docker save ${{ steps.vars.outputs.frontend-tag }} -o frontend.tar
 
      - name: Upload backend image tar
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend.tar
          retention-days: 1
 
      - name: Upload frontend image tar
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar
          retention-days: 1
 
      - name: Push images to DockerHub
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker push ${{ steps.vars.outputs.backend-tag }}
          docker push ${{ steps.vars.outputs.frontend-tag }}
          # latest tag bhi push karo
          docker tag ${{ steps.vars.outputs.backend-tag }}  ${DOCKER_USER}/skillpulse-backend:latest
          docker tag ${{ steps.vars.outputs.frontend-tag }} ${DOCKER_USER}/skillpulse-frontend:latest
          docker push ${DOCKER_USER}/skillpulse-backend:latest
          docker push ${DOCKER_USER}/skillpulse-frontend:latest
 
  # ─────────────────────────────────────────────
  # Job 3: Container Scan — Trivy (Backend)
  # ─────────────────────────────────────────────
  trivy-backend:
    name: Trivy Scan — Backend
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
 
      
      - name: Download backend image tar
        uses: actions/download-artifact@v4
        with:
          name: backend-image
 
      - name: Load backend image
        run: docker load -i backend.tar
 
      - name: Run Trivy on backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.backend-tag }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
 
      - name: Upload Trivy backend SARIF
        if: ${{ always() && hashFiles('trivy-backend.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
 
  # ─────────────────────────────────────────────
  # Job 4: Container Scan — Trivy (Frontend)
  # ─────────────────────────────────────────────
  trivy-frontend:
    name: Trivy Scan — Frontend
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
 
      - name: Download frontend image tar
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
 
      - name: Load frontend image
        run: docker load -i frontend.tar
 
      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.frontend-tag }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
 
      - name: Upload Trivy frontend SARIF
        if: ${{ always() && hashFiles('trivy-frontend.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
 
  # ─────────────────────────────────────────────
  # Job 5: CD Trigger──
  trigger-cd:
    name: Trigger CD
    runs-on: ubuntu-latest
    needs: [semgrep, trivy-backend, trivy-frontend]
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Dispatch CD workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              event_type: 'ci-success',
              client_payload: { sha: context.sha }
            })